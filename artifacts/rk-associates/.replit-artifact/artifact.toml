kind = "web"
previewPath = "/"
title = "RK Associates"
version = "1.0.0"
id = "artifacts/rk-associates"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22342

[services.development]
run = "pnpm --filter @workspace/rk-associates run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rk-associates", "run", "build" ]
publicDir = "artifacts/rk-associates/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22342"
BASE_PATH = "/"
